<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta Pixel Test Page</title>

    <!-- Meta Pixel Code - Standard Implementation -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js",
      );
      fbq("init", "295232087762996");
      fbq("track", "PageView");
    </script>
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=295232087762996&ev=PageView&noscript=1"
      />
    </noscript>
    <!-- End Meta Pixel Code -->
  </head>
  <body>
    <h1>Meta Pixel Test Page</h1>
    <p>
      Open Meta Pixel Helper extension - it should show the pixel immediately on
      page load.
    </p>
    <p>Pixel ID: 295232087762996</p>

    <hr />
    <h2>Test Events</h2>
    <button onclick="fbq('track', 'Lead')">Test Lead Event</button>
    <button onclick="fbq('track', 'Contact')">Test Contact Event</button>
    <button onclick="fbq('trackCustom', 'TestEvent', { test: true })">
      Test Custom Event
    </button>

    <hr />
    <h3>Debug Info</h3>
    <pre id="debug"></pre>
    <script>
      // Debug: Check if fbq is defined
      setTimeout(function () {
        var debug = document.getElementById("debug");
        debug.textContent =
          "fbq defined: " + (typeof fbq !== "undefined") + "\n";
        debug.textContent +=
          "fbq.queue length: " +
          (fbq && fbq.queue ? fbq.queue.length : "N/A") +
          "\n";
        debug.textContent += "Page loaded at: " + new Date().toISOString();
      }, 1000);
    </script>
  </body>
</html>
